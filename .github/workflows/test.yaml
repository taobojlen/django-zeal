name: Test
on:
  push:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.0", "6.0"]
        exclude:
          # django 5 requires python >=3.10
          - python-version: 3.9
            django-version: 5.0
          - python-version: 3.9
            django-version: 5.1
          # django 6 requires python >=3.12
          - python-version: 3.9
            django-version: 6.0
          - python-version: 3.10
            django-version: 6.0
          - python-version: 3.11
            django-version: 6.0
    name: Test (Python ${{ matrix.python-version }}, Django ${{ matrix.django-version }})

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: make ci
      - run: pip install Django~=${{ matrix.django-version }}
      - run: make test

  test-django-prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    name: Test Django prerelease (Python ${{ matrix.python-version }})

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: make ci
      - run: pip install --pre django
      - run: make test

  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.12
          cache: 'pip'
      - run: make ci
      - run: make typecheck
